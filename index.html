<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto DCA Dashboard</title>

  <link rel="stylesheet" href="styles.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
</head>
<body>

  <!-- LOGIN SCREEN -->

  <section id="login-screen" class="login-screen">
    <div class="card">

      <h1>DCA Dashboard</h1>
      <p>Login required</p>

      <input
        id="email"
        type="email"
        placeholder="Email"
        autocomplete="email"
      >

      <input
        id="password"
        type="password"
        placeholder="Password"
        autocomplete="current-password"
      >

      <button id="login-btn">
        Login
      </button>

      <p id="login-error"></p>

    </div>
  </section>

  <!-- PROTECTED APP -->

  <main id="app-screen" class="app hidden">

    <header class="topbar">
      <div>
        <h1>DCA Dashboard</h1>
        <p>BTC / ETH / USDC accumulation</p>
      </div>
    </header>

    <!-- PORTFOLIO -->

    <section class="card">
      <h2>Portfolio</h2>

      <div class="metric">
        <span>Total Value</span>
        <strong id="total-value">€0.00</strong>
      </div>

      <div class="metric">
        <span>Total Invested</span>
        <strong id="total-invested">€0.00</strong>
      </div>

      <div class="metric">
        <span>Unrealized P/L</span>
        <strong id="unrealized-pl">€0.00</strong>
      </div>
    </section>

    <!-- ALLOCATION -->

    <section class="card">
      <h2>Allocation</h2>

      <div class="metric">
        <span>BTC</span>
        <strong id="btc-allocation">0%</strong>
      </div>

      <div class="metric">
        <span>ETH</span>
        <strong id="eth-allocation">0%</strong>
      </div>

      <div class="metric">
        <span>USDC</span>
        <strong id="usdc-allocation">0%</strong>
      </div>
    </section>

    <!-- MONTHLY PLAN -->

    <section class="card">
      <h2>Monthly Plan</h2>

      <div class="metric">
        <span>BTC Core</span>
        <strong>€105</strong>
      </div>

      <div class="metric">
        <span>ETH Core</span>
        <strong>€105</strong>
      </div>

      <div class="metric">
        <span>USDC / Yield</span>
        <strong>€90</strong>
      </div>
    </section>

    <!-- NAVIGATION -->

    <nav class="bottom-nav">
      <button class="active">Dashboard</button>
      <button>Prices</button>
      <button>Transactions</button>
      <button>Journal</button>
    </nav>

  </main>

  <script src="app.js"></script>

</body>
</html>
