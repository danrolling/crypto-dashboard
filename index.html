<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Crypto DCA Dashboard</title>
        <link rel="stylesheet" href="styles.css" />
        </head>
        <body>
          <main class="app">
              <header class="topbar">
                    <div>
                            <h1>DCA Dashboard</h1>
                                    <p>BTC / ETH / USDC accumulation</p>
                                          </div>
                                              </header>

                                                  <section class="card">
                                                        <h2>Portfolio</h2>
                                                              <div class="metric">
                                                                      <span>Total Value</span>
                                                                              <strong id="total-value">€0.00</strong>
                                                                                    </div>
                                                                                          <div class="metric">
                                                                                                  <span>Total Invested</span>
                                                                                                          <strong id="total-invested">€0.00</strong>
                                                                                                                </div>
                                                                                                                      <div class="metric">
                                                                                                                              <span>Unrealized P/L</span>
                                                                                                                                      <strong id="unrealized-pl">€0.00</strong>
                                                                                                                                            </div>
                                                                                                                                                </section>

                                                                                                                                                    <section class="card">
                                                                                                                                                          <h2>Allocation</h2>
                                                                                                                                                                <div class="metric">
                                                                                                                                                                        <span>BTC</span>
                                                                                                                                                                                <strong id="btc-allocation">0%</strong>
                                                                                                                                                                                      </div>
                                                                                                                                                                                            <div class="metric">
                                                                                                                                                                                                    <span>ETH</span>
                                                                                                                                                                                                            <strong id="eth-allocation">0%</strong>
                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                        <div class="metric">
                                                                                                                                                                                                                                <span>USDC</span>
                                                                                                                                                                                                                                        <strong id="usdc-allocation">0%</strong>
                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                  </section>

                                                                                                                                                                                                                                                      <section class="card">
                                                                                                                                                                                                                                                            <h2>Monthly Plan</h2>
                                                                                                                                                                                                                                                                  <div class="metric">
                                                                                                                                                                                                                                                                          <span>BTC Core</span>
                                                                                                                                                                                                                                                                                  <strong>€105</strong>
                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                              <div class="metric">
                                                                                                                                                                                                                                                                                                      <span>ETH Core</span>
                                                                                                                                                                                                                                                                                                              <strong>€105</strong>
                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                          <div class="metric">
                                                                                                                                                                                                                                                                                                                                  <span>USDC / Yield</span>
                                                                                                                                                                                                                                                                                                                                          <strong>€90</strong>
                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                    </section>

                                                                                                                                                                                                                                                                                                                                                        <nav class="bottom-nav">
                                                                                                                                                                                                                                                                                                                                                              <button class="active">Dashboard</button>
                                                                                                                                                                                                                                                                                                                                                                    <button>Prices</button>
                                                                                                                                                                                                                                                                                                                                                                          <button>Transactions</button>
                                                                                                                                                                                                                                                                                                                                                                                <button>Journal</button>
                                                                                                                                                                                                                                                                                                                                                                                    </nav>
                                                                                                                                                                                                                                                                                                                                                                                      </main>

                                                                                                                                                                                                                                                                                                                                                                                        <script src="app.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                        </html>
